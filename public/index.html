<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Personagem</title>

<style>
body{
margin:0;
background:#040b16;
color:#e5d4b0;
font-family:Georgia,serif;
text-align:center;
padding-top:80px;
}

input,select{
padding:12px;
font-size:16px;
margin:10px;
border-radius:6px;
border:none;
width:260px;
max-width:80vw;
}

button{
padding:14px 20px;
font-size:16px;
background:#d6b26e;
border:none;
border-radius:10px;
cursor:pointer;
}

#status{
margin:20px auto 0;
color:#ffcc88;
white-space:pre-wrap;
padding:12px;
max-width:700px;
text-align:center;
}
</style>
</head>
<body>

<h1>Criar Personagem</h1>

<input id="nickname" placeholder="Nome do personagem">

<br>

<select id="playerClass">
<option value="Cavaleiro">Cavaleiro</option>
<option value="Mago">Mago</option>
<option value="Caçador">Caçador</option>
</select>

<br>

<button id="createBtn">Criar Personagem</button>

<div id="status">CARREGANDO SCRIPT...</div>

<script src="/index.js"></script>

</body>
</html>
