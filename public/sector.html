<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setor de Farm</title>

<style>
body{
margin:0;
background:#061223;
color:#d6c28a;
font-family:Georgia,serif;
padding:20px;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#0e1c33;
padding:18px;
border-radius:12px;
border:1px solid #2a3c5a;
margin-bottom:16px;
}

h1,h2,h3,p{
margin-top:0;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#091423;
padding:12px;
border-radius:10px;
border:1px solid #213454;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

button{
background:#c9a96a;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.secondary{
background:#334a7a;
color:#fff;
}

button.danger{
background:#7a3340;
color:#fff;
}

#log{
white-space:pre-wrap;
line-height:1.4;
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
  <h1 id="sectorName">Setor</h1>
  <p id="sectorRange">Faixa de nível</p>
</div>

<div class="card">
  <h2>Personagem</h2>
  <div class="stats">
    <div class="box" id="playerInfo">Carregando...</div>
    <div class="box" id="playerExtra">Carregando...</div>
  </div>
</div>

<div class="card">
  <h2>Combate</h2>
  <div class="stats">
    <div class="box" id="monsterInfo">Nenhum monstro ativo.</div>
    <div class="box" id="combatState">Aguardando spawn.</div>
  </div>

  <div class="actions">
    <button id="spawnBtn">Procurar Monstro</button>
    <button id="attackBtn">Atacar</button>
    <button id="fleeBtn" class="danger">Fugir</button>
    <button id="hubBtn" class="secondary">Voltar ao Hub</button>
  </div>
</div>

<div class="card">
  <h2>Log</h2>
  <div id="log">Entrando no setor...</div>
</div>

</div>

<script src="/sector.js"></script>

</body>
</html>
