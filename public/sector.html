<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setor de Farm</title>

<style>
body{
margin:0;
background:#061223;
color:#d6c28a;
font-family:Georgia,serif;
padding:20px;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#0e1c33;
padding:18px;
border-radius:12px;
border:1px solid #2a3c5a;
margin-bottom:16px;
}

h1,h2,h3,p{
margin-top:0;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#091423;
padding:12px;
border-radius:10px;
border:1px solid #213454;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

button{
background:#c9a96a;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.secondary{
background:#334a7a;
color:#fff;
}

button.danger{
background:#7a3340;
color:#fff;
}

button.heal{
background:#2f7a4a;
color:#fff;
}

button.auto{
background:#6f4ba8;
color:#fff;
}

button.skill{
background:#8a5a14;
color:#fff;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

#log{
white-space:pre-wrap;
line-height:1.4;
}

#deathOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

#deathOverlay.show{
display:flex;
}

.deathBox{
max-width:520px;
width:100%;
background:#140b12;
border:1px solid #7a3340;
border-radius:16px;
padding:28px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

.deathBox h2{
font-size:34px;
margin-bottom:10px;
color:#f0b6c0;
}

.deathBox p{
font-size:20px;
line-height:1.5;
color:#f3d9df;
margin:0;
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
  <h1 id="sectorName">Setor</h1>
  <p id="sectorRange">Faixa de nível</p>
</div>

<div class="card">
  <h2>Personagem</h2>
  <div class="stats">
    <div class="box" id="playerInfo">Carregando...</div>
    <div class="box" id="playerExtra">Carregando...</div>
  </div>
</div>

<div class="card">
  <h2>Combate</h2>
  <div class="stats">
    <div class="box" id="monsterInfo">Nenhum monstro ativo.</div>
    <div class="box" id="combatState">Aguardando spawn.</div>
  </div>

  <div class="actions">
    <button id="spawnBtn">Procurar Monstro</button>
    <button id="attackBtn">Atacar</button>
    <button id="skill1Btn" class="skill">Skill 1</button>
    <button id="skill2Btn" class="skill">Skill 2</button>
    <button id="potionBtn" class="heal">Usar Poção</button>
    <button id="autoAttackBtn" class="auto">Auto Attack: OFF</button>
    <button id="autoPotionBtn" class="auto">Auto Poção: OFF</button>
    <button id="fleeBtn" class="danger">Fugir</button>
    <button id="hubBtn" class="secondary">Voltar ao Hub</button>
  </div>
</div>

<div class="card">
  <h2>Log</h2>
  <div id="log">Entrando no setor...</div>
</div>

</div>

<div id="deathOverlay">
  <div class="deathBox">
    <h2>☠️ Você foi derrotado</h2>
    <p id="deathText">Retornando ao Hub...</p>
  </div>
</div>

<script src="/sector.js"></script>

</body>
</html>
